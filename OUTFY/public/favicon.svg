<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1714" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D9B5" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#9E8030" />
    </linearGradient>
  </defs>
  <!-- Background Squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <!-- Elegant Accent Border -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#gold-grad)" stroke-width="8" opacity="0.6" />
  <!-- Brand Monogram "O" -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="'DM Serif Display', 'Didot', 'Georgia', serif" font-size="280" font-weight="bold" fill="url(#gold-grad)">O</text>
</svg>